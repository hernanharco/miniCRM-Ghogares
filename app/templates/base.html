<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM Bayiva — Grupo Hogares{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe',
                            300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6',
                            600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .btn-arriba {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 50;
            opacity: 0; visibility: hidden; cursor: pointer; transition: opacity 0.3s, visibility 0.3s;
        }
        .btn-arriba.visible { opacity: 1; visibility: visible; }
        /* Transición suave al cambiar de contenido */
        .htmx-swapping { opacity: 0; }
        .htmx-added { animation: fadeIn 0.15s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
    </style>
</head>
<body class="h-full bg-gray-50">

    <!-- Barra de navegación superior -->
    <nav class="sticky top-0 z-10 bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <span class="text-lg">🏠</span>
                    <span class="text-sm font-bold text-gray-900">CRM Bayiva</span>
                    <span class="text-[10px] uppercase tracking-wider text-gray-400 hidden sm:inline">Grupo Hogares</span>
                </div>

                <!-- Links de navegación (HTMX: solo cambia el main) -->
                <div class="flex items-center gap-1 overflow-x-auto" id="nav-links">
                    <a href="/"
                       hx-get="/" hx-target="main" hx-select="#main-content" hx-push-url="true"
                       class="nav-link px-3 py-1.5 text-sm font-medium rounded-md transition-colors whitespace-nowrap text-gray-600 hover:text-gray-900 hover:bg-gray-100">
                        📊 Dashboard
                    </a>
                    <a href="/propiedades"
                       hx-get="/propiedades" hx-target="main" hx-select="#main-content" hx-push-url="true"
                       class="nav-link px-3 py-1.5 text-sm font-medium rounded-md transition-colors whitespace-nowrap text-gray-600 hover:text-gray-900 hover:bg-gray-100">
                        🏘️ Propiedades
                    </a>
                    <a href="/contactos"
                       hx-get="/contactos" hx-target="main" hx-select="#main-content" hx-push-url="true"
                       class="nav-link px-3 py-1.5 text-sm font-medium rounded-md transition-colors whitespace-nowrap text-gray-600 hover:text-gray-900 hover:bg-gray-100">
                        👥 Contactos
                    </a>
                    <a href="/pipeline"
                       hx-get="/pipeline" hx-target="main" hx-select="#main-content" hx-push-url="true"
                       class="nav-link px-3 py-1.5 text-sm font-medium rounded-md transition-colors whitespace-nowrap text-gray-600 hover:text-gray-900 hover:bg-gray-100">
                        📊 Pipeline
                    </a>
                    <a href="/matches"
                       hx-get="/matches" hx-target="main" hx-select="#main-content" hx-push-url="true"
                       class="nav-link px-3 py-1.5 text-sm font-medium rounded-md transition-colors whitespace-nowrap text-gray-600 hover:text-gray-900 hover:bg-gray-100">
                        🔗 Matches
                    </a>
                    <a href="/scraper"
                       hx-get="/scraper" hx-target="main" hx-select="#main-content" hx-push-url="true"
                       class="nav-link px-3 py-1.5 text-sm font-medium rounded-md transition-colors whitespace-nowrap text-gray-600 hover:text-gray-900 hover:bg-gray-100">
                        🚀 Scrapers
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main id="main-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Boton volver arriba -->
    <button id="btnArriba" onclick="window.scrollTo({top:0,behavior:'smooth'})"
            class="btn-arriba bg-brand-600 text-white p-3 rounded-full shadow-lg hover:bg-brand-700 transition-colors"
            aria-label="Volver arriba">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"></path>
        </svg>
    </button>

    <script>
        // ── Auth: token JWT de Supabase ──
        (function() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            if (token) {
                window.AUTH_TOKEN = token;
                window.history.replaceState({}, '', window.location.pathname);
            }
            document.addEventListener('htmx:configRequest', function(e) {
                if (window.AUTH_TOKEN) {
                    e.detail.headers['Authorization'] = 'Bearer ' + window.AUTH_TOKEN;
                }
            });
        })();

        // ── Navegación: resaltar link activo ──
        function highlightActiveNav() {
            const path = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(function(link) {
                const href = link.getAttribute('href');
                let isActive = false;
                if (href === '/' && path === '/') isActive = true;
                else if (href !== '/' && path.startsWith(href)) isActive = true;

                if (isActive) {
                    link.classList.add('bg-brand-100', 'text-brand-700');
                    link.classList.remove('text-gray-600', 'hover:text-gray-900', 'hover:bg-gray-100');
                } else {
                    link.classList.remove('bg-brand-100', 'text-brand-700');
                    link.classList.add('text-gray-600', 'hover:text-gray-900', 'hover:bg-gray-100');
                }
            });
        }

        // Al cargar la página
        highlightActiveNav();

        // Después de cada render HTMX
        document.addEventListener('htmx:afterSwap', highlightActiveNav);

        // ── Boton volver arriba ──
        window.addEventListener('scroll', function() {
            const btn = document.getElementById('btnArriba');
            if (btn) btn.classList.toggle('visible', window.scrollY > 400);
        });
    </script>
</body>
</html>
