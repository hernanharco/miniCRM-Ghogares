<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM Bayiva — Grupo Hogares{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe',
                            300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6',
                            600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .btn-arriba {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 50;
            opacity: 0; visibility: hidden; cursor: pointer; transition: opacity 0.3s, visibility 0.3s;
        }
        .btn-arriba.visible { opacity: 1; visibility: visible; }
        /* Transición solo en contenido, no en nav */
        #contenido { transition: opacity 0.15s ease-in; }
        #contenido.htmx-swapping { opacity: 0; }
        .nav-scroll { scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-full bg-gray-50" hx-boost="true" hx-target="#contenido" hx-select="#contenido" hx-swap="innerHTML">

    <!-- Barra de navegación superior (NO se reemplaza) -->
    <nav class="sticky top-0 z-10 bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <div class="flex items-center gap-2 shrink-0">
                    <span class="text-lg">🏠</span>
                    <span class="text-sm font-bold text-gray-900">CRM Bayiva</span>
                </div>
                <div class="flex items-center gap-1 overflow-x-auto nav-scroll ml-4">
                    <a href="/"
                       class="px-3 py-1.5 text-sm font-medium whitespace-nowrap rounded-md transition-colors
                              {% if request.url.path == '/' %}bg-brand-100 text-brand-700{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %}">
                        📊 Dashboard
                    </a>
                    <a href="/propiedades"
                       class="px-3 py-1.5 text-sm font-medium whitespace-nowrap rounded-md transition-colors
                              {% if request.url.path.startswith('/propiedades') %}bg-brand-100 text-brand-700{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %}">
                        🏘️ Propiedades
                    </a>
                    <a href="/contactos"
                       class="px-3 py-1.5 text-sm font-medium whitespace-nowrap rounded-md transition-colors
                              {% if request.url.path.startswith('/contactos') %}bg-brand-100 text-brand-700{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %}">
                        👥 Contactos
                    </a>
                    <a href="/matches"
                       class="px-3 py-1.5 text-sm font-medium whitespace-nowrap rounded-md transition-colors
                              {% if request.url.path.startswith('/matches') %}bg-brand-100 text-brand-700{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %}">
                        🔗 Matches
                    </a>
                    <a href="/scraper"
                       class="px-3 py-1.5 text-sm font-medium whitespace-nowrap rounded-md transition-colors
                              {% if request.url.path.startswith('/scraper') %}bg-brand-100 text-brand-700{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-100{% endif %}">
                        🚀 Scrapers
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenido principal (solo esto se reemplaza) -->
    <div id="contenido" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </div>

    <!-- Boton volver arriba -->
    <button id="btnArriba" onclick="window.scrollTo({top:0,behavior:'smooth'})"
            class="btn-arriba bg-brand-600 text-white p-3 rounded-full shadow-lg hover:bg-brand-700 transition-colors"
            aria-label="Volver arriba">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"></path>
        </svg>
    </button>

    <script>
        // Auth: token JWT de Supabase
        (function() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            if (token) {
                window.AUTH_TOKEN = token;
                window.history.replaceState({}, '', window.location.pathname);
            }
            document.addEventListener('htmx:configRequest', function(e) {
                if (window.AUTH_TOKEN) {
                    e.detail.headers['Authorization'] = 'Bearer ' + window.AUTH_TOKEN;
                }
            });
        })();

        // ── Navegación: resaltar link activo ──
        function actualizarNav() {
            const path = window.location.pathname;
            document.querySelectorAll('nav a[href]').forEach(function(a) {
                const h = a.getAttribute('href');
                // Quitar clases activas
                a.classList.remove('bg-brand-100', 'text-brand-700');
                a.classList.add('text-gray-600', 'hover:text-gray-900', 'hover:bg-gray-100');

                // Poner activa si corresponde
                if ((h === '/' && path === '/') || (h !== '/' && path.startsWith(h))) {
                    a.classList.add('bg-brand-100', 'text-brand-700');
                    a.classList.remove('text-gray-600', 'hover:text-gray-900', 'hover:bg-gray-100');
                }
            });
        }
        actualizarNav();
        document.addEventListener('htmx:afterSwap', actualizarNav);

        // ── Boton volver arriba ──
        window.addEventListener('scroll', function() {
            const btn = document.getElementById('btnArriba');
            if (btn) btn.classList.toggle('visible', window.scrollY > 400);
        });
    </script>
</body>
</html>
