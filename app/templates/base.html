<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM Bayiva — Grupo Hogares{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Sidebar overlay para mobile */
        .sidebar-overlay {
            display: none;
        }
        .sidebar-open .sidebar-overlay {
            display: block;
        }
        @media (min-width: 1024px) {
            .sidebar-overlay {
                display: none !important;
            }
        }
        /* Boton volver arriba */
        .btn-arriba {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
            cursor: pointer;
        }
        .btn-arriba.visible {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body class="h-full" hx-boost="true">
    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay fixed inset-0 bg-black/50 z-20 lg:hidden" onclick="toggleSidebar()"></div>

    <div class="min-h-full flex">
        <!-- Hamburger button (mobile only) -->
        <button onclick="toggleSidebar()"
                class="fixed top-4 left-4 z-30 lg:hidden bg-brand-900 text-white p-2.5 rounded-lg shadow-lg hover:bg-brand-800 transition-colors"
                aria-label="Menú">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path id="hamburger-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-20 w-64 bg-brand-900 text-white flex flex-col
                      -translate-x-full lg:translate-x-0 lg:static lg:z-auto
                      transition-transform duration-200 ease-in-out">
            <div class="px-4 lg:px-6 py-4 lg:py-6">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-lg lg:text-xl font-bold tracking-tight">🏠 CRM Bayiva</h1>
                        <p class="text-brand-300 text-xs lg:text-sm mt-0.5">Grupo Hogares</p>
                    </div>
                    <!-- Close button (mobile) -->
                    <button onclick="toggleSidebar()" class="lg:hidden text-white/60 hover:text-white p-1">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <nav class="flex-1 px-3 lg:px-4 space-y-1">
                <a href="/"
                   data-hx-boost="false"
                   class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg {% if request.url.path == '/' %}bg-brand-800 text-white{% else %}text-brand-200 hover:bg-brand-800 hover:text-white{% endif %} transition-colors">
                    <span class="mr-3">📊</span>
                    Dashboard
                </a>
                <a href="/propiedades"
                   data-hx-boost="false"
                   class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg {% if request.url.path.startswith('/propiedades') %}bg-brand-800 text-white{% else %}text-brand-200 hover:bg-brand-800 hover:text-white{% endif %} transition-colors">
                    <span class="mr-3">🏘️</span>
                    Propiedades
                </a>
                <a href="/contactos"
                   data-hx-boost="false"
                   class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg {% if request.url.path.startswith('/contactos') %}bg-brand-800 text-white{% else %}text-brand-200 hover:bg-brand-800 hover:text-white{% endif %} transition-colors">
                    <span class="mr-3">👥</span>
                    Contactos
                </a>
                <a href="/matches"
                   data-hx-boost="false"
                   class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg {% if request.url.path.startswith('/matches') %}bg-brand-800 text-white{% else %}text-brand-200 hover:bg-brand-800 hover:text-white{% endif %} transition-colors">
                    <span class="mr-3">🔗</span>
                    Matches
                </a>
                <a href="/scraper"
                   data-hx-boost="false"
                   class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg {% if request.url.path.startswith('/scraper') %}bg-brand-800 text-white{% else %}text-brand-200 hover:bg-brand-800 hover:text-white{% endif %} transition-colors">
                    <span class="mr-3">🚀</span>
                    Scrapers
                </a>
            </nav>
            <div class="px-4 lg:px-6 py-4 border-t border-brand-800">
                <p class="text-xs text-brand-400">CRM Bayiva v0.1</p>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 min-w-0 overflow-auto">
            <div class="px-4 sm:px-6 lg:px-8 py-4 lg:py-6 pt-16 lg:pt-6">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Boton volver arriba -->
    <button id="btnArriba" onclick="window.scrollTo({top:0,behavior:'smooth'})"
            class="btn-arriba bg-brand-600 text-white p-3 rounded-full shadow-lg hover:bg-brand-700 transition-colors"
            aria-label="Volver arriba">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"></path>
        </svg>
    </button>

    <script>
        // ── Auth: extraer JWT de la URL y pasarlo en requests HTMX ──
        // El token viene como ?token=JWT del iframe en portal.bayiva.com
        // Se guarda globalmente y se inyecta en el header Authorization
        // de cada request HTMX (incluyendo hx-boost).
        (function() {
            const params = new URLSearchParams(window.location.search);
            const tokenFromUrl = params.get('token');
            if (tokenFromUrl) {
                window.AUTH_TOKEN = tokenFromUrl;
                // Limpiar la URL para que no quede el token visible
                window.history.replaceState({}, '', window.location.pathname);
            }

            document.addEventListener('htmx:configRequest', function(e) {
                if (window.AUTH_TOKEN) {
                    e.detail.headers['Authorization'] = 'Bearer ' + window.AUTH_TOKEN;
                }
            });
        })();

        // Mostrar/ocultar boton volver arriba
        window.addEventListener('scroll', function() {
            const btn = document.getElementById('btnArriba');
            if (window.scrollY > 400) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const body = document.body;
            sidebar.classList.toggle('-translate-x-full');
            body.classList.toggle('sidebar-open');
            // Bloquear scroll en mobile cuando el sidebar está abierto
            if (body.classList.contains('sidebar-open')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        }

        // Cerrar sidebar al hacer click en un link (mobile)
        document.querySelectorAll('#sidebar a[href]').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 1024) {
                    toggleSidebar();
                }
            });
        });
    </script>
</body>
</html>
